<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSnap | Intelligent Nutrition Analysis</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #6366f1;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.1);
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text-main);
            margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center;
        }

        .container { width: 100%; max-width: 500px; padding: 24px; box-sizing: border-box; }

        /* Professional Header */
        header { width: 100%; text-align: left; padding: 20px 0; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
        .logo { font-weight: 800; font-size: 1.5rem; letter-spacing: -1px; display: flex; align-items: center; gap: 8px; }
        .logo span { color: var(--accent); }

        /* Card System */
        .glass-card {
            background: var(--card); border-radius: 24px; padding: 24px;
            border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            margin-bottom: 20px; transition: transform 0.3s ease;
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Scanner */
        #reader { width: 100%; border-radius: 16px; overflow: hidden; border: 2px solid var(--accent); margin: 15px 0; }

        /* Bento Grid */
        .bento-grid { 
            display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px;
        }
        .bento-item {
            background: rgba(255,255,255,0.03); padding: 16px; border-radius: 16px; 
            border: 1px solid var(--border); cursor: pointer; transition: 0.2s; text-align: left;
        }
        .bento-item:hover { background: rgba(99, 102, 241, 0.1); border-color: var(--accent); }
        .bento-item .label { font-size: 0.75rem; color: var(--text-dim); text-transform: uppercase; font-weight: 600; }
        .bento-item .val { font-size: 1.1rem; font-weight: 700; margin-top: 4px; display: block; }

        /* Stash UI */
        .stash-list { margin-top: 15px; }
        .stash-row { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 0; border-bottom: 1px solid var(--border);
        }
        .stash-info b { display: block; font-size: 0.95rem; }
        .stash-info span { font-size: 0.8rem; color: var(--text-dim); }

        /* Buttons */
        .btn {
            background: var(--accent); color: white; border: none; padding: 16px 24px;
            border-radius: 14px; font-weight: 600; font-size: 1rem; cursor: pointer;
            width: 100%; transition: 0.3s; margin-top: 10px;
        }
        .btn:hover { filter: brightness(1.2); transform: translateY(-2px); }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
        .btn-danger { background: rgba(239, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        
        .price-chip { background: var(--success); color: white; padding: 4px 12px; border-radius: 8px; font-size: 0.8rem; font-weight: 700; }

        /* Loading Spinner */
        .loader { width: 40px; height: 40px; border: 3px solid rgba(255,255,255,0.1); border-top-color: var(--accent); border-radius: 50%; animation: spin 1s infinite linear; margin: 20px auto; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div class="logo">🧬 Nutri<span>Snap</span></div>
    </header>

    <div id="home-screen" class="screen active">
        <div class="glass-card">
            <h2 style="margin-top:0">Analyze your nutrition.</h2>
            <p style="color: var(--text-dim); font-size: 0.9rem;">High-precision nutrient analysis via Open Food Facts & Open Prices API.</p>
            <button class="btn" onclick="startScanner()">Initialize Scanner</button>
        </div>

        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <h3 style="margin:0">Active Stash</h3>
                <button onclick="downloadStash()" style="background:none; border:none; color:var(--accent); cursor:pointer; font-weight:600;">Export .TXT</button>
            </div>
            <div id="stash-items" class="stash-list"></div>
            <div id="stash-footer" style="margin-top:20px; padding-top:15px; border-top: 1px solid var(--border); display:flex; justify-content:space-between;">
                <span style="color:var(--text-dim)">Total Allocation</span>
                <b id="stash-total">$0.00</b>
            </div>
            <button class="btn btn-outline" style="margin-top:15px;" onclick="clearStash()">Clear Stash</button>
        </div>
    </div>

    <div id="scanner-screen" class="screen">
        <div class="glass-card">
            <h3>Scanning...</h3>
            <div id="reader"></div>
            <button class="btn btn-outline" onclick="location.reload()">Return Home</button>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <div class="glass-card">
            <p style="text-align:center">Fetching API Data...</p>
            <div class="loader"></div>
        </div>
    </div>

    <div id="options-screen" class="screen">
        <div class="glass-card">
            <div style="display:flex; justify-content:space-between; align-items:start;">
                <h3 id="prodName" style="margin:0; font-size: 1.2rem; flex:1; padding-right:10px;">Product Name</h3>
                <div id="live-price" class="price-chip">$0.00</div>
            </div>
            <div id="prodVibe" style="font-size: 0.85rem; color:var(--text-dim); margin-top:8px;"></div>
            
            <div class="bento-grid" id="grid"></div>
            
            <button class="btn" onclick="performStashAdd()" style="margin-top:24px;">Add to Stash</button>
            <button class="btn btn-outline" onclick="location.reload()">Discard</button>
        </div>
    </div>

    <div id="detail-screen" class="screen">
        <div class="glass-card">
            <div id="detIcon" style="font-size: 3rem; margin-bottom: 10px;">✨</div>
            <span id="detTitle" style="color:var(--text-dim); font-size: 0.8rem; font-weight: 700; text-transform: uppercase;">Nutrient</span>
            <div id="detValue" style="font-size: 2.5rem; font-weight: 800; margin: 8px 0;">0.0000g</div>
            <p id="detAnalysis" style="line-height:1.5; color:var(--text-dim); background:rgba(255,255,255,0.03); padding:16px; border-radius:12px;"></p>
            <button class="btn" onclick="switchScreen('options-screen')">Back to Dashboard</button>
        </div>
    </div>
</div>

<script>
    let globalProduct = null;
    let globalPrice = 0;
    const html5QrCode = new Html5Qrcode("reader");

    const nutrientMeta = {
        'energy-kcal_100g': { label: 'Energy', icon: '⚡', unit: 'kcal' },
        'sugars_100g': { label: 'Sugar', icon: '🍬', unit: 'g' },
        'proteins_100g': { label: 'Protein', icon: '💪', unit: 'g' },
        'fat_100g': { label: 'Fats', icon: '🥑', unit: 'g' },
        'saturated-fat_100g': { label: 'Sat Fat', icon: '🍔', unit: 'g' },
        'salt_100g': { label: 'Sodium', icon: '🧂', unit: 'g' },
        'carbohydrates_100g': { label: 'Carbs', icon: '🍞', unit: 'g' },
        'fiber_100g': { label: 'Fiber', icon: '🥦', unit: 'g' }
    };

    function startScanner() {
        switchScreen('scanner-screen');
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            html5QrCode.stop().then(() => fetchAllData(text));
        });
    }

    async function fetchAllData(barcode) {
        switchScreen('loading-screen');
        try {
            const offRes = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
            const priceRes = await fetch(`https://prices.openfoodfacts.org/api/v1/prices?product_code=${barcode}`);
            const offData = await offRes.json();
            const priceData = await priceRes.json();

            if (offData.status === 1) {
                globalProduct = offData.product;
                globalPrice = (priceData.items && priceData.items.length > 0) ? parseFloat(priceData.items[0].price) : 0;
                renderDashboard();
            } else { alert("Product not recognized."); location.reload(); }
        } catch (e) { alert("API connectivity lost."); location.reload(); }
    }

    function renderDashboard() {
        document.getElementById('live-price').innerText = `$${globalPrice.toFixed(2)}`;
        document.getElementById('prodName').innerText = globalProduct.product_name || "Unknown Product";
        document.getElementById('prodVibe').innerText = "Data verified against Open Food Facts master database.";

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        Object.keys(nutrientMeta).forEach(key => {
            const val = globalProduct.nutriments[key];
            if (val !== undefined) {
                const div = document.createElement('div');
                div.className = 'bento-item';
                div.onclick = () => showDetail(key, val);
                div.innerHTML = `<span class="label">${nutrientMeta[key].label}</span><span class="val">${val.toFixed(4)}<small>${nutrientMeta[key].unit}</small></span>`;
                grid.appendChild(div);
            }
        });
        switchScreen('options-screen');
    }

    function showDetail(key, val) {
        const p = val.toFixed(4);
        document.getElementById('detIcon').innerText = nutrientMeta[key].icon;
        document.getElementById('detTitle').innerText = nutrientMeta[key].label;
        document.getElementById('detValue').innerText = p + nutrientMeta[key].unit;
        
        const descMap = {
            'energy-kcal_100g': `Measured energy density of ${p}kcal/100g. High density indicates significant metabolic fuel availability.`,
            'sugars_100g': `Sugar content is recorded at ${p}g. Recommended glycemic load management suggests moderate intake for this item.`,
            'proteins_100g': `Total amino acid profile yields ${p}g of protein per serving. Essential for muscular repair and enzymatic function.`
        };
        
        document.getElementById('detAnalysis').innerText = descMap[key] || `Detailed laboratory-grade measurement: ${p}g detected in reference sample.`;
        switchScreen('detail-screen');
    }

    function performStashAdd() {
        let stash = JSON.parse(localStorage.getItem('pro_stash') || '[]');
        stash.push({ id: Date.now(), name: globalProduct.product_name, price: globalPrice });
        localStorage.setItem('pro_stash', JSON.stringify(stash));
        location.reload();
    }

    function removeStash(id) {
        let stash = JSON.parse(localStorage.getItem('pro_stash') || '[]');
        stash = stash.filter(i => i.id !== id);
        localStorage.setItem('pro_stash', JSON.stringify(stash));
        updateStashUI();
    }

    function updateStashUI() {
        const stash = JSON.parse(localStorage.getItem('pro_stash') || '[]');
        const list = document.getElementById('stash-items');
        const total = document.getElementById('stash-total');
        
        if (stash.length > 0) {
            list.innerHTML = stash.map(i => `
                <div class="stash-row">
                    <div class="stash-info"><b>${i.name}</b><span>Verified Item</span></div>
                    <div style="text-align:right">
                        <b>$${i.price.toFixed(2)}</b><br>
                        <span onclick="removeStash(${i.id})" style="color:var(--danger); cursor:pointer; font-size:0.7rem;">Remove</span>
                    </div>
                </div>`).join('');
            const sum = stash.reduce((s, i) => s + i.price, 0);
            total.innerText = `$${sum.toFixed(2)}`;
        } else {
            list.innerHTML = `<p style="color:var(--text-dim); font-size:0.85rem;">Stash empty. Awaiting scans.</p>`;
        }
    }

    function downloadStash() {
        const stash = JSON.parse(localStorage.getItem('pro_stash') || '[]');
        let txt = "NUTRISNAP LOG\nGenerated: " + new Date().toLocaleString() + "\n\n";
        stash.forEach(i => txt += `[ ] ${i.name.padEnd(30)} $${i.price.toFixed(2)}\n`);
        const blob = new Blob([txt], {type: 'text/plain'});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "nutrisnap_export.txt";
        a.click();
    }

    function clearStash() { localStorage.removeItem('pro_stash'); updateStashUI(); }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    updateStashUI();
</script>
</body>
</html>
