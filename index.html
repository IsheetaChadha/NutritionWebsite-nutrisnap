<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NutriSnap Ultra | Deep Analysis</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --p1: #ff7675; --p3: #55efc4; --p5: #a29bfe;
            --glass: rgba(255, 255, 255, 0.98);
            --bg: linear-gradient(135deg, #6c5ce7, #a29bfe, #74b9ff, #55efc4);
        }

        body { 
            font-family: 'Inter', sans-serif; background: var(--bg); background-size: 400% 400%;
            animation: gradient 15s ease infinite; margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; color: #2d3436;
        }

        @keyframes gradient { 0% {background-position: 0% 50%;} 50% {background-position: 100% 50%;} 100% {background-position: 0% 50%;} }

        .container { width: 95%; max-width: 600px; padding: 20px; box-sizing: border-box; }

        .card {
            background: var(--glass); padding: 30px; border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.2); backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.4); text-align: center;
        }

        /* MOBILE OPTIMIZED HEADER */
        .vibe-card { 
            background: white; padding: 20px; border-radius: 25px; margin-bottom: 20px; 
            text-align: left; border-left: 10px solid var(--p1); position: relative;
        }
        #prodName { 
            margin: 0; font-size: 1.4rem; line-height: 1.2; 
            word-wrap: break-word; overflow-wrap: break-word; width: 100%;
            display: block; padding-right: 70px; /* Space for price badge */
        }
        .price-badge { 
            position: absolute; top: 15px; right: 15px; background: var(--p3); color: #006266; 
            padding: 5px 10px; border-radius: 50px; font-weight: 900; font-size: 0.85rem;
        }

        .screen { display: none; }
        .active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        #reader { width: 100%; border-radius: 24px; overflow: hidden; border: 6px solid white; margin: 20px 0; }

        .bento-grid { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; 
            margin: 20px 0; max-height: 320px; overflow-y: auto; padding: 5px;
        }
        .bento-item {
            background: white; border-radius: 20px; padding: 15px 5px; cursor: pointer;
            transition: 0.3s; border: 1px solid #eee; display: flex; flex-direction: column; align-items: center;
        }

        .analysis-display { font-size: 1.1rem; line-height: 1.6; padding: 25px; border-radius: 30px; margin: 20px 0; background: #f8f9ff; border: 2px solid #eef2ff; }

        .btn { background: #2d3436; color: white; border: none; padding: 18px; border-radius: 22px; font-size: 1.1rem; font-weight: 800; width: 100%; cursor: pointer; margin-bottom: 10px; }
        
        /* STASH DRAWER & REMOVE BUTTONS */
        .stash-drawer { margin-top: 20px; text-align: left; background: rgba(255,255,255,0.6); padding: 20px; border-radius: 30px; border: 1px solid white; }
        .stash-item { 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid rgba(0,0,0,0.05); padding: 10px 0; font-size: 0.9rem;
        }
        .stash-item-info { flex: 1; padding-right: 10px; line-height: 1.2; }
        .remove-btn { 
            background: #ff767522; color: #d63031; border: none; 
            padding: 5px 10px; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 0.75rem;
        }

        .spinner {
            width: 50px; height: 50px; border: 5px solid #f3f3f3;
            border-top: 5px solid var(--p1); border-radius: 50%;
            animation: spin 1s linear infinite; margin: 20px auto;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <div id="home-screen" class="screen active">
        <div class="card">
            <h1 style="font-size: 3.5rem; margin: 0; letter-spacing: -3px;">NutriSnap<span style="color:var(--p1)">.</span></h1>
            <button class="btn" onclick="startScanner()" style="background:var(--p1)">🚀 SCAN A SNACK</button>
            
            <div class="stash-drawer">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <b>🛒 Your Stash</b>
                    <div>
                        <button onclick="downloadStash()" style="border:none; background:var(--p3); color:#006266; padding: 5px 10px; border-radius: 8px; font-weight:bold; cursor:pointer; font-size:0.75rem; margin-right:5px;">Download</button>
                        <button onclick="clearStash()" style="border:none; background:#eee; color:#636e72; padding: 5px 10px; border-radius: 8px; font-weight:bold; cursor:pointer; font-size:0.75rem;">Clear All</button>
                    </div>
                </div>
                <div id="stash-items">Stash is empty!</div>
                <div id="stash-total" style="margin-top:15px; font-weight:900; border-top: 2px solid rgba(0,0,0,0.1); padding-top:10px; font-size: 1.2rem;">Total: $0.00</div>
            </div>
        </div>
    </div>

    <div id="scanner-screen" class="screen">
        <div class="card">
            <div id="reader"></div>
            <button class="btn" style="background:#dfe6e9; color:#2d3436;" onclick="location.reload()">BACK HOME</button>
        </div>
    </div>

    <div id="loading-screen" class="screen">
        <div class="card">
            <h2>Analyzing...</h2>
            <div class="spinner"></div>
        </div>
    </div>

    <div id="options-screen" class="screen">
        <div class="card">
            <div class="vibe-card">
                <div class="price-badge" id="live-price">$0.00</div>
                <h2 id="prodName">Product Name</h2>
                <div id="prodVibe" style="font-size: 0.9rem; color: #636e72; margin-top: 8px;"></div>
            </div>
            <div class="bento-grid" id="grid"></div>
            <button class="btn" onclick="performStashAdd()" style="background:var(--p3); color:#006266;">✅ ADD TO STASH</button>
            <button class="btn" style="background:#dfe6e9; color:#2d3436;" onclick="location.reload()">CANCEL</button>
        </div>
    </div>

    <div id="detail-screen" class="screen">
        <div class="card">
            <div id="detIcon" style="font-size: 5rem;">✨</div>
            <h2 id="detTitle" style="color: #b2bec3; letter-spacing: 2px; font-size: 0.9rem;">STAT</h2>
            <div id="detValue" style="font-size: 3rem; font-weight: 900; margin: 10px 0; color: var(--p1);">0.0000g</div>
            <div id="detAnalysis" class="analysis-display"></div>
            <button class="btn" onclick="switchScreen('options-screen')">BACK</button>
        </div>
    </div>
</div>

<script>
    let globalProduct = null;
    let globalPrice = 0;
    const html5QrCode = new Html5Qrcode("reader");

    const nutrientMeta = {
        'energy-kcal_100g': { label: 'Energy', icon: '⚡', unit: 'kcal' },
        'sugars_100g': { label: 'Sugar', icon: '🍬', unit: 'g' },
        'proteins_100g': { label: 'Protein', icon: '💪', unit: 'g' },
        'fat_100g': { label: 'Fats', icon: '🥑', unit: 'g' },
        'saturated-fat_100g': { label: 'Sat Fat', icon: '🍔', unit: 'g' },
        'salt_100g': { label: 'Salt', icon: '🧂', unit: 'g' },
        'carbohydrates_100g': { label: 'Carbs', icon: '🍞', unit: 'g' },
        'fiber_100g': { label: 'Fiber', icon: '🥦', unit: 'g' },
        'calcium_100g': { label: 'Calcium', icon: '🦴', unit: 'g' },
        'iron_100g': { label: 'Iron', icon: '🧲', unit: 'g' }
    };

    function getAnalysis(id, val) {
        const p = val.toFixed(4);
        const map = {
            'energy-kcal_100g': val > 300 ? `🔥 High-power fuel! At ${p}kcal, this is a dense energy source.` : `🍃 Light and breezy! Just ${p}kcal makes this a super easy choice.`,
            'sugars_100g': val > 15 ? `🍭 Sugar rush! There's ${p}g here. Watch for that energy dip later!` : `✨ Steady energy. Only ${p}g of sugar means a smooth experience!`,
            'proteins_100g': val > 10 ? `💪 Muscle power! A solid ${p}g of protein helps you stay strong.` : `🌾 Gentle protein. At ${p}g, it's a nice little building block!`,
            'fat_100g': val > 20 ? `🥑 Rich & Creamy! The ${p}g of fat provides deep flavor, but it's a heavier serving.` : `🍃 Lean profile. With only ${p}g of fat, this stays very light.`,
            'saturated-fat_100g': val > 5 ? `🍔 Heavy richness. ${p}g of sat fat is quite high. Enjoy as a special treat!` : `✅ Heart-smart! Just ${p}g of sat fat keeps this in the healthy zone.`,
            'salt_100g': val > 1.2 ? `🧂 Savory punch! ${p}g of salt is significant. Stay hydrated!` : `🌊 Lightly seasoned. Only ${p}g of salt lets the natural flavors shine.`,
            'carbohydrates_100g': val > 45 ? `🍞 Carb loaded! ${p}g provides plenty of energy for your day.` : `🍃 Low-carb focus. At ${p}g, this won't weigh you down.`,
            'fiber_100g': val > 5 ? `🥦 Digestive win! ${p}g of fiber is amazing for your gut health.` : `✨ Smooth sailing. It has ${p}g of fiber—every little bit helps!`,
            'calcium_100g': val > 0.1 ? `🦴 Bone strength! The ${p}g of calcium here helps build a strong foundation.` : `🥛 Trace minerals. At ${p}g of calcium, this adds a tiny hint of support.`,
            'iron_100g': val > 0.005 ? `🧲 Iron strong! This provides ${p}g of iron, essential for oxygen in your blood.` : `✨ Basic iron. It contains ${p}g—a small but helpful contribution.`
        };
        return map[id];
    }

    function startScanner() {
        switchScreen('scanner-screen');
        html5QrCode.start({ facingMode: "environment" }, { fps: 20, qrbox: 250 }, (text) => {
            html5QrCode.stop().then(() => fetchProduct(text));
        });
    }

    async function fetchProduct(barcode) {
        switchScreen('loading-screen');
        try {
            const res = await fetch(`https://world.openfoodfacts.org/api/v2/product/${barcode}.json`);
            const data = await res.json();
            if (data.status === 1) {
                globalProduct = data.product;
                let priceMap = JSON.parse(localStorage.getItem('prices') || '{}');
                if (!priceMap[barcode]) {
                    priceMap[barcode] = (barcode.length % 5) + 1.99 + (Math.random() * 0.5);
                    localStorage.setItem('prices', JSON.stringify(priceMap));
                }
                globalPrice = priceMap[barcode];
                renderDashboard();
            } else { alert("Not found!"); location.reload(); }
        } catch (e) { alert("Connection error."); }
    }

    function renderDashboard() {
        document.getElementById('live-price').innerText = `$${globalPrice.toFixed(2)}`;
        document.getElementById('prodName').innerText = globalProduct.product_name || "Tasty Treat";
        document.getElementById('prodVibe').innerText = `This looks yummy! Let's check the stats. ✨`;

        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        Object.keys(nutrientMeta).forEach(key => {
            const val = globalProduct.nutriments[key];
            if (val !== undefined) {
                const div = document.createElement('div');
                div.className = 'bento-item';
                div.onclick = () => {
                    document.getElementById('detIcon').innerText = nutrientMeta[key].icon;
                    document.getElementById('detTitle').innerText = nutrientMeta[key].label;
                    document.getElementById('detValue').innerText = val.toFixed(4) + nutrientMeta[key].unit;
                    document.getElementById('detAnalysis').innerText = getAnalysis(key, val);
                    switchScreen('detail-screen');
                };
                div.innerHTML = `<span style="font-size:2rem">${nutrientMeta[key].icon}</span><b>${nutrientMeta[key].label}</b>`;
                grid.appendChild(div);
            }
        });
        switchScreen('options-screen');
    }

    function performStashAdd() {
        let stash = JSON.parse(localStorage.getItem('my_stash') || '[]');
        stash.push({ id: Date.now(), name: globalProduct.product_name || "Unknown", price: globalPrice });
        localStorage.setItem('my_stash', JSON.stringify(stash));
        location.reload();
    }

    function removeItem(id) {
        let stash = JSON.parse(localStorage.getItem('my_stash') || '[]');
        stash = stash.filter(item => item.id !== id);
        localStorage.setItem('my_stash', JSON.stringify(stash));
        updateStashUI();
    }

    function clearStash() {
        localStorage.removeItem('my_stash');
        updateStashUI();
    }

    function downloadStash() {
        const stash = JSON.parse(localStorage.getItem('my_stash') || '[]');
        if (stash.length === 0) return alert("Stash is empty!");
        
        let text = "--- MY NUTRISNAP GROCERY LIST ---\n\n";
        let total = 0;
        stash.forEach((item, i) => {
            text += `${i+1}. ${item.name} - $${item.price.toFixed(2)}\n`;
            total += item.price;
        });
        text += `\n------------------------------\nTOTAL ESTIMATE: $${total.toFixed(2)}`;
        
        const blob = new Blob([text], { type: 'text/plain' });
        const anchor = document.createElement('a');
        anchor.download = "nutrisnap_stash.txt";
        anchor.href = window.URL.createObjectURL(blob);
        anchor.click();
    }

    function updateStashUI() {
        const stash = JSON.parse(localStorage.getItem('my_stash') || '[]');
        const list = document.getElementById('stash-items');
        const totalDisp = document.getElementById('stash-total');
        if (stash.length > 0) {
            list.innerHTML = stash.map(item => `
                <div class="stash-item">
                    <div class="stash-item-info"><b>${item.name}</b><br>$${item.price.toFixed(2)}</div>
                    <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
                </div>`).join('');
            const sum = stash.reduce((s, i) => s + i.price, 0);
            totalDisp.innerText = `Total: $${sum.toFixed(2)}`;
        } else {
            list.innerHTML = "Stash is empty!";
            totalDisp.innerText = "Total: $0.00";
        }
    }

    function switchScreen(id) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    updateStashUI();
</script>
</body>
</html>
